<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nitrate</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<style>
  body {
    margin: 2rem;
    font-family: "EB Garamond", Garamond, monospace;
    font-size: 0.95rem;
    line-height: 1.6;
    background: #fff;
    color: #000;
    max-width: 600px;
  }

  p {
    margin: 0 0 1.5rem 0;
  }

  a {
    color: inherit;
    text-decoration: none;
  }

  a:hover {
    color: blue;
    text-decoration: underline;
  }

  .bubble-wrap {
    cursor: default;
    user-select: none;
  }
  .bubble-line {
    display: inline-flex;
    align-items: flex-end;
    white-space: nowrap;
  }
  .char-slot {
    display: inline-flex;
    align-items: flex-end;
    justify-content: center;
    transition: width 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
    overflow: visible;
  }
  .char-inner {
    display: inline-block;
    transform-origin: bottom center;
    transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: pre;
    line-height: 1;
  }
  .line-spacer {
    transition: height 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
</style>
 
<!-- JS — paste before </body> -->
<script>
(function () {
  const PEAK = 3;
  const FALLOFF = 5;
  const LINE_GAP = 10; // px gap between lines at rest
 
  function getScale(dist) {
    if (dist >= FALLOFF) return 1;
    const t = dist / FALLOFF;
    return 1 + (PEAK - 1) * Math.pow(1 - t, 1.8);
  }
 
  function measureChar(ch, fontSize, fontFamily) {
    const tmp = document.createElement('span');
    tmp.style.cssText = `position:absolute;visibility:hidden;font-size:${fontSize}px;font-family:${fontFamily};white-space:pre`;
    tmp.textContent = ch;
    document.body.appendChild(tmp);
    const w = tmp.getBoundingClientRect().width;
    document.body.removeChild(tmp);
    return w;
  }
 
  window.buildBubbleText = function (container, text) {
    // Skip on touch/mobile devices
    if (window.matchMedia('(hover: none)').matches) return;
 
    const style = window.getComputedStyle(container);
    const fontSize = parseFloat(style.fontSize);
    const fontFamily = style.fontFamily;
 
    container.innerHTML = '';
    const allChars = [];
    const lineData = [];
    let activeLineIdx = -1;
 
    text.split('\n').forEach((lineText, li) => {
      const spacer = document.createElement('div');
      spacer.className = 'line-spacer';
      spacer.style.height = LINE_GAP + 'px';
 
      const lineEl = document.createElement('div');
      lineEl.className = 'bubble-line';
 
      const chars = [];
      [...lineText].forEach((ch, ci) => {
        const baseW = measureChar(ch, fontSize, fontFamily);
 
        const slot = document.createElement('span');
        slot.className = 'char-slot';
        slot.style.width = baseW + 'px';
 
        const inner = document.createElement('span');
        inner.className = 'char-inner';
        inner.textContent = ch;
 
        slot.appendChild(inner);
        lineEl.appendChild(slot);
 
        const obj = { slot, inner, li, ci, baseW };
        chars.push(obj);
        allChars.push(obj);
 
        slot.addEventListener('mouseenter', () => applyEffect(li, ci));
      });
 
      lineData.push({ lineEl, spacer, chars });
      container.appendChild(lineEl);
      container.appendChild(spacer);
    });
 
    function applyEffect(hli, hci) {
      if (activeLineIdx !== -1 && activeLineIdx !== hli) resetLine(activeLineIdx);
      activeLineIdx = hli;
 
      const { chars, spacer } = lineData[hli];
      let maxScale = 1;
 
      chars.forEach(c => {
        const scale = getScale(Math.abs(c.ci - hci));
        c.inner.style.transform = `scale(${scale.toFixed(3)})`;
        c.slot.style.width = (c.baseW * scale).toFixed(1) + 'px';
        if (scale > maxScale) maxScale = scale;
      });
 
      spacer.style.height = (LINE_GAP + (maxScale - 1) * fontSize * 0.6).toFixed(1) + 'px';
    }
 
    function resetLine(li) {
      const { chars, spacer } = lineData[li];
      chars.forEach(c => {
        c.inner.style.transform = 'scale(1)';
        c.slot.style.width = c.baseW + 'px';
      });
      spacer.style.height = LINE_GAP + 'px';
    }
 
    container.addEventListener('mouseleave', () => {
      lineData.forEach((_, li) => resetLine(li));
      activeLineIdx = -1;
    });
  };
})();
</script>

</head>
<body>

<p><a href="/index.html"><strong>Nitrate</strong></a></p>

<p>
  Nitrate screens films, releases physical copies of those films, shows them online, and writes about the filmmakers.<br>
  <br>
  To stay in touch with nitrate, sign up here:
  <p>
  <form id="signup">
    <input type="email" name="email" placeholder="email" required style="font-family: inherit; font-size: inherit; border: none; border-bottom: 1px solid #000; outline: none; background: transparent; width: 200px;">
    <button type="submit" style="font-family: inherit; font-size: inherit; background: none; border: none; cursor: pointer; padding-left: 0.5rem;">subscribe</button>
  </form>
</p>

<script>
  document.getElementById("signup").addEventListener("submit", async function(e) {
    e.preventDefault();
    const email = this.email.value;
    await fetch("https://script.google.com/macros/s/AKfycbxFOfrZMOJkfmhgl-s7SUr6rl-Ge84j3iyQLnL5poMifdsIUVV-anM9jk8UvtGKVNyf/exec", { method: "POST", body: new URLSearchParams({ email }) });
    this.reset();
    this.innerHTML = "done.";
  });
</script>

</body>
</html>
