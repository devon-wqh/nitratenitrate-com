name = "nitratenitrate-com"
main = "worker.js"
compatibility_date = "2026-06-24"

# Serve the static HTML/images straight from the repo root.
[assets]
directory = "."
binding = "ASSETS"

# Click counter for the Tickets links (written by worker.js).
[[analytics_engine_datasets]]
binding = "TICKETS"
dataset = "ticket_clicks"
