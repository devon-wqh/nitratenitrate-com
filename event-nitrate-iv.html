<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nitrate iv — Nitrate</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  body {
    margin: 2rem;
    font-family: "EB Garamond", serif;
    font-size: 0.95rem;
    line-height: 1.6;
    background: #fff;
    color: #000;
    max-width: 600px;
  }

  p {
    margin: 0 0 1.5rem 0;
  }

  a {
    color: inherit;
    text-decoration: none;
  }

  a:hover {
    text-decoration: underline;
  }

  .nav {
    display: flex;
    justify-content: space-between;
    margin-bottom: 2.5rem;
  }

  .event-header {
    border-bottom: 1px solid #000;
    padding-bottom: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .event-title {
    font-size: 1.35rem;
    font-weight: 500;
    line-height: 1.3;
    margin-bottom: 0.4rem;
  }

  .event-address {
    color: #555;
  }

  .program {
    margin-bottom: 2rem;
  }

  .program-section {
    margin-bottom: 1rem;
  }

  .program-label {
    font-style: italic;
    border-bottom: 1px solid #ddd;
    display: block;
    margin-bottom: 0.2rem;
  }

  .program-item {
    display: block;
    color: #aaa;
  }

  .rsvp {
    margin-top: 1.5rem;
    max-width: 280px;
  }

  #ticket-buy {
    font-family: "EB Garamond", serif;
    font-size: 0.95rem;
    background: #000;
    color: #fff;
    border: none;
    padding: 0.3rem 1rem;
    cursor: pointer;
  }

  #ticket-buy:hover {
    background: #333;
  }

  #ticket-buy:disabled {
    opacity: 0.5;
    cursor: default;
  }

  .ticket-error {
    color: #c00;
    font-size: 0.85rem;
    margin-top: 0.4rem;
    min-height: 1.1em;
  }

  .rsvp-success {
    font-style: italic;
  }
</style>
</head>
<body>

<div class="nav">
  <a href="/index.html">Nitrate</a>
  <a href="/events.html">← Events</a>
</div>

<div class="event-header">
  <div class="event-title">Nitrate iv</div>
  <div>August 1, 2026</div>
  <div class="event-address">Bed-Stuy, Brooklyn</div>
  <div class="event-address">$5 at door</div>
</div>

<div class="program">
  <div class="program-section">
    <span class="program-label">Lineup</span>
    <span class="program-item">TBA</span>
  </div>
</div>

<div class="rsvp">
  <div id="ticket-form">
    <button id="ticket-buy" onclick="buyTicket()">Buy ticket — $5 →</button>
    <div class="ticket-error" id="ticket-error"></div>
  </div>
  <p class="rsvp-success" id="ticket-done" style="display:none">Ticket confirmed. August 1 · Bed-Stuy, Brooklyn.</p>
  <p class="ticket-error" id="ticket-cancelled" style="display:none">Checkout cancelled — you can try again anytime.</p>
</div>

<img src="fliers/nitrate-iv.png" alt="Nitrate iv flier" style="width:100%;display:block;margin-top:2rem;">

<script>
async function buyTicket() {
  var btn = document.getElementById('ticket-buy');
  var err = document.getElementById('ticket-error');
  err.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Redirecting…';

  try {
    var res = await fetch('/api/checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ event: 'nitrate-iv' })
    });
    var data = await res.json();
    if (!res.ok || !data.url) throw new Error();
    window.location.href = data.url;
  } catch (e) {
    err.textContent = 'Something went wrong. Please try again.';
    btn.disabled = false;
    btn.textContent = 'Buy ticket — $5 →';
  }
}

(function () {
  var status = new URLSearchParams(window.location.search).get('ticket');
  if (status === 'success') {
    document.getElementById('ticket-form').style.display = 'none';
    document.getElementById('ticket-done').style.display = 'block';
  } else if (status === 'cancelled') {
    document.getElementById('ticket-cancelled').style.display = 'block';
  }
})();
</script>

</body>
</html>
