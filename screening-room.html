<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screening Room — Nitrate</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  body {
    margin: 2rem;
    font-family: "EB Garamond", serif;
    font-size: 0.95rem;
    line-height: 1.6;
    background: #fff;
    color: #000;
    max-width: 1400px;
  }

  a {
    color: inherit;
    text-decoration: none;
  }

  a:hover {
    color: blue;
    text-decoration: underline;
  }

  .nav {
    display: flex;
    justify-content: space-between;
    margin-bottom: 2.5rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 200px));
    gap: 1.5rem;
  }

  .poster-card {
    display: flex;
    flex-direction: column;
    border: 1px solid #ccc;
  }

  .poster-image {
    aspect-ratio: 27 / 40;
    background: #fff;
    margin: 0.7rem;
  }

  .poster-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .poster-info {
    flex: 1;
    padding: 0.6rem 0.7rem;
    overflow: hidden;
    border-top: 1px solid #ccc;
  }

  .poster-title {
    font-weight: 500;
    font-style: italic;
    line-height: 1.3;
    margin-bottom: 0.1rem;
  }

  .poster-credits {
    color: #555;
    font-size: 0.8rem;
    line-height: 1.5;
  }

  @media (max-width: 480px) {
    .grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }
</style>
</head>
<body>

<div class="nav">
  <a href="/index.html"><strong>Nitrate</strong></a>
</div>

<div class="grid">

  <div class="poster-card">
    <a href="/spider-film.html">
      <div class="poster-image">
        <img src="posters/spider%20poster.jpg" alt="Spider poster">
      </div>
    </a>
    <div class="poster-info">
      <div class="poster-title"><a href="/spider-film.html">Spider</a></div>
      <div class="poster-credits">dir. Cate Christiansen</div>
    </div>
  </div>

</div>

<script>
function equalizeCards() {
  const cards = document.querySelectorAll('.poster-card');
  cards.forEach(c => c.style.height = '');
  let maxH = 0;
  cards.forEach(c => { if (c.offsetHeight > maxH) maxH = c.offsetHeight; });
  cards.forEach(c => c.style.height = maxH + 'px');
}

document.addEventListener('DOMContentLoaded', function () {
  equalizeCards();
  window.addEventListener('resize', equalizeCards);
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(equalizeCards);
});
</script>

</body>
</html>
